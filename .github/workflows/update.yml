name: Atualizar Bolão

on:
  schedule:
    - cron: '7,22,37,52 16-23 * * *'
    - cron: '7,22,37,52 0-7 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  atualizar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Buscar resultados na football-data.org
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
        run: python engine/fetch_results.py

      - name: Recalcular ranking, tabelão e snapshot
        run: python engine/run_ranking.py

      - name: Commit das atualizações (se houver)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "Nenhuma mudança para commitar."
          else
            git commit -m "Auto-update: resultados $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
